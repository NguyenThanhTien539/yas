name: order service ci

on:
  push:
    branches: ["**"]
    paths:
      - "order/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/order-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "order/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/order-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # PHASE 1 – TEST
  # Runs on every push to give developers early feedback.
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarCloud blame history and Gitleaks full log scan

      - uses: ./.github/workflows/actions # Setup JDK 21, cache Maven & Sonar

      # Scan for secrets leaked in commit history
      - name: Gitleaks – Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -am builds all dependencies before verifying the order module
      - name: Run Maven Verify (test + coverage)
        run: mvn -B clean verify -pl order -am -DskipITs

      # Checkstyle requires reactor context for CI-friendly versioning
      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl order -am -Dcheckstyle.output.file=order-checkstyle-result.xml

      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/order-checkstyle-result.xml"

      # Publish test results to PR/commit page
      - name: Upload Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure() # Run even on failure to show report
        with:
          name: Order-Service-Unit-Test-Results
          path: "order/**/surefire-reports/TEST*.xml"
          reporter: java-junit

      # Posts coverage comment on PR; fails if overall coverage < 70%.
      # Works with branch protection "require status checks" to block low-coverage merges.
      - name: Add Coverage Report to PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/order/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          title: "Order Coverage Report"
          update-comment: true

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-jacoco-report
          path: order/target/site/jacoco

      - name: VerifyCoverage
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sys,xml.etree.ElementTree as ET
          p='order/target/site/jacoco/jacoco.xml'
          try:
            root=ET.parse(p).getroot()
          except Exception:
            print('ERROR: cannot read',p); sys.exit(1)
          c=root.find("./counter[@type='LINE']")
          if c is None:
            print('ERROR: LINE counter missing'); sys.exit(1)
          missed=int(c.get('missed','0')); covered=int(c.get('covered','0'))
          pct=covered/(missed+covered)*100 if (missed+covered)>0 else 0.0
          print(f'Overall LINE coverage: {pct:.2f}%')
          if pct < 70.0:
            print(f'ERROR: coverage {pct:.2f}% < 70.00%'); sys.exit(1)
          PY

      # Scan for HIGH+ CVEs in the dependency tree.
      # Uses order/pom.xml to resolve the correct dependency tree in this monorepo.
      # continue-on-error: results are advisory, not blocking.
      - name: Install Snyk CLI
        run: npm install -g snyk

      # - name: Snyk test
      #   continue-on-error: true
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      #   run: |
      #     find . -name "mvnw" -exec chmod +x {} \;

      #     # Inject -Drevision via .mvn/maven.config so both Maven layers (outer CLI + inner
      #     # snyk-linux binary) pick it up without needing extra env vars or --maven-args.
      #     mkdir -p .mvn
      #     echo "-Drevision=1.0-SNAPSHOT" > .mvn/maven.config

      #     # Install root POM + common-library so Snyk can resolve artifact coordinates.
      #     mvn install -pl common-library -am -DskipTests -q

      #     # Replace ${revision} literals in installed POMs.
      #     # Maven's artifact descriptor reader does not apply system properties to POMs
      #     # read from ~/.m2, causing resolution failures on Central.
      #     find ~/.m2/repository/com/yas -name "*.pom" \
      #       -exec sed -i 's/\${revision}/1.0-SNAPSHOT/g' {} \;

      #     snyk auth $SNYK_TOKEN
      #     snyk test --file=order/pom.xml \
      #       --project-name=yas-order \
      #       --severity-threshold=high \
      #       --json-file-output=snyk-report.json \
      #       --debug || true

      #     if [ -f snyk-report.json ]; then
      #       echo "snyk-report.json created successfully"
      #       npx snyk-to-html -i snyk-report.json -o snyk-report.html
      #     else
      #       echo "snyk-report.json NOT FOUND - Snyk crashed during dependency resolution!"
      #       exit 1
      #     fi

      - name: Snyk Monitor (Push to Web UI)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # 1. Setup Maven context cho biến ${revision}
          mkdir -p .mvn
          echo "-Drevision=1.0-SNAPSHOT" > .mvn/maven.config

          # 2. Cài đặt module order VÀ tất cả các dependencies nội bộ của nó vào ~/.m2
          # Lệnh này mất thêm vài giây nhưng là "lá chắn" chắc chắn nhất chống lại lỗi -13
          mvn install -pl order -am -DskipTests -q

          # 3. Chạy Snyk Monitor với cờ debug (-d) để xem chi tiết nếu có lỗi
          snyk monitor --file=order/pom.xml \
            --org=nguyenthanhtien539 \
            --project-name=yas-order-service \
            --target-name=NguyenThanhTien539/yas \
            -d

      - name: Upload Snyk Report (HTML)
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('snyk-report.html') != ''
        with:
          name: order-snyk-report-html
          path: snyk-report.html

      # Reuse compiled classes and test reports from the verify step above.
      # Avoids re-running compile+test by using sonar:sonar with -DskipTests.
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -pl order \
            -am \
            -DskipTests \
            -Dsonar.organization=nguyenthanhtien539 \
            -Dsonar.projectKey=NguyenThanhTien539_yas \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/order/target/site/jacoco/jacoco.xml \
            -Dsonar.junit.reportPaths=${GITHUB_WORKSPACE}/order/target/surefire-reports

  # ─────────────────────────────────────────────
  # PHASE 2 – BUILD
  # Runs only on PR to main or push to main.
  # Feature branches only need the test phase for fast feedback.
  # Build + OWASP scan (~10 min) is only needed before merge.
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test # Runs only if test job passes
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      # Build full dependency chain and package order; skip tests (already run in test phase).
      # Maven cache from the test phase speeds this up significantly.
      - name: Run Maven Build
        run: mvn -B clean install -pl order -am -DskipTests

      # Scan CVEs in the full dependency tree after build
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: "yas"
          path: "."
          format: "HTML"

      - name: Upload OWASP Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: OWASP Dependency Check Report
          path: ${{ github.workspace }}/reports
